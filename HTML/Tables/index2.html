<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Table</title>
    <link rel="stylesheet" href="./style2.css">
</head>
<body>
    <h1>Time Table</h1>
    <table>
        <tr class="sno">
            <th class="days">DAYS</th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th>4</th>
            <th>5</th>
            <th>6</th>
            <th>7</th>
        </tr>

        <tr class="period">
            <th class="days">Monday</th>
            <td>Maths</td>
            <td>Science</td>
            <td colspan="2">Physics</td>
            <td>Chemistry</td>
            <td colspan="2">Games</td>
        </tr>

        <tr class="period">
            <th class="days">Tuesday</th>
            <td>Maths</td>
            <td>Science</td>
            <td colspan="2">Games</td>
            <td> Physics</td>
            <td>S.U.P.W</td>
            <td>Hindi</td>
            
        </tr>

        <tr class="period">
            <th class="days">Wednesday</th>
            <td>Hindi</td>
            <td>English</td>
            <td >Maths</td>
            <td>English</td>
            <td>Chemistry</td>
            <td colspan="2">Python</td>
        </tr>

        <tr class="period">
            <th class="days">Thursday</th>
            <td>Computer Science</td>
            <td>Maths</td>
            <td colspan="2">English</td>
            <td>Chemistry</td>
            <td colspan="2">Maths</td>
        </tr>
    </table>
    
</body>
</html>
