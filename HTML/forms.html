<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>this is a heading</h1>

    <form action="index.php" method="POST">
        <label for="first-name">first-name:</label>
        <input type="text" id="first-name" placeholder="Bugs"><br>
    
        <label for="last-name">last-name:</label>
        <input type="text" id="last-name" placeholder="Bunny"><br>

        <label for="email">email:</label>
        <input type="email" id="email" placeholder="bugsBunny123@gmail.com" size="25px"><br>

        <label for="pass">password:</label>
        <input type="password" id="pass" minlength="6" ><br>

        <label for="phone">phone no:</label>
        <input type="tel" id="phone" pattern="[0-9]{5}-[0-9]{5}" placeholder="12345-67890" minlength="11" maxlength="11"><br>

        <label for="bday">BirthDay:</label>
        <input type="date" id="bday"><br>

        <label for="quantity">quantity</label>
        <input type="number" id="quantity" min="0" max="100"><br>

        <label for="title">Title:</label>

        <label for="mr">Mr.</label>
        <input type="radio" value="Mr" name="title" id="mr">

        <label for="mrs">Mrs.</label>
        <input type="radio" value="Mrs." name="title" id="mrs">

        <label for="Phd">Phd.</label>
        <input type="radio" value="Phd." name="title" id="Phd."><br>
       

        <label for="subscribe">subscribe</label>
        <input type="checkbox" id="subscribe" ><br>

        <br>
        <input type="submit">
        <input type="reset">
        <br>

        
    </form>
   
</body>
</html>
